name: merchant_local
description: 포이즌 셀러 관리 로컬 앱 (Windows + Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 로컬 데이터베이스 ───────────────────────────────
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0

  # ── CRDT (기기 간 충돌 해결) ──────────────────────────
  crdt: ^5.1.3

  # ── Google Drive 동기화 ──────────────────────────────
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.0

  # ── POIZON Open API 연동 ─────────────────────────────
  dio: ^5.4.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  retry: ^3.1.2

  # ── 상태 관리 ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # ── 직렬화 ─────────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── 유틸리티 ───────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0
  logger: ^2.3.0

  # ── UI ─────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  go_router: ^13.2.0
  file_picker: ^8.0.0

  # ── 바코드 / 카메라 / 이미지 ─────────────────────────
  mobile_scanner: ^6.0.2
  image_picker: ^1.0.7
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 코드 생성
  build_runner: ^2.4.9
  drift_dev: ^2.15.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
